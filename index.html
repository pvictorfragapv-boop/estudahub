<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTUDAHUB | MEDICINA</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CONFIGURAÇÕES VISUAIS ORIGINAIS */
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0a0a0a; --bg2:#111111; --bg3:#181818;
            --border:#2a2a2a; --border2:#333; --text:#e8e8e8;
            --muted:#666; --accent:#e8e8e8; --green:#22c55e;
            --yellow:#eab308; --red:#ef4444; --blue:#3b82f6;
        }
        .theme-default{--accent:#e8e8e8;--hi:#ffffff}
        body{background:var(--bg);color:var(--text);font-family:'Space+Mono',monospace;overflow-x:hidden}
        
        .screen{display:none;min-height:100vh;padding:20px;animation:fadeIn 0.4s ease}
        .screen.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        /* ESTILO DO LOGIN */
        .login-card{max-width:400px;margin:100px auto;padding:40px;background:var(--bg2);border:1px solid var(--border);text-align:center}
        .btn-google{background:#fff;color:#000;border:none;padding:12px 20px;cursor:pointer;font-weight:700;margin-top:20px;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit}
        .loading{position:fixed;inset:0;background:var(--bg);display:flex;justify-content:center;align-items:center;z-index:9999;color:var(--accent)}
    </style>
</head>
<body class="theme-default">

    <div id="loading-screen" class="loading">// SINCRONIZANDO_NUVEM...</div>

    <section id="login-screen" class="screen">
        <div class="login-card">
            <h1 style="font-family:'Syne'; font-size:2.5rem">ESTUDAHUB</h1>
            <p style="color:var(--muted); margin-top:10px">// SISTEMA DE GESTÃO MÉDICA</p>
            <button class="btn-google" id="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                ENTRAR COM GOOGLE
            </button>
        </div>
    </section>

    <section id="main-screen" class="screen">
        <header style="display:flex; justify-content:space-between; border-bottom:1px solid var(--border); padding-bottom:20px; align-items:center">
            <div>
                <h1 id="user-display" style="font-family:'Syne'">ESTUDANTE</h1>
                <p id="cloud-status" style="color:var(--green); font-size:0.8rem">● CONECTADO AO FIREBASE</p>
            </div>
            <button onclick="logout()" style="background:none; border:1px solid var(--red); color:var(--red); padding:5px 10px; cursor:pointer; font-family:inherit">SAIR</button>
        </header>

        <main style="margin-top:40px">
            <h2 style="font-family:'Syne'">MEUS TEMAS DE ESTUDO</h2>
            <div id="temas-list" style="margin-top:20px"></div>
            <button onclick="addTema()" style="margin-top:20px; padding:12px 20px; cursor:pointer; background:var(--accent); color:#000; border:none; font-weight:bold; font-family:inherit">
                + ADICIONAR NOVO TEMA
            </button>
        </main>
    </section>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // SUAS CREDENCIAIS
        const firebaseConfig = {
            apiKey: "AIzaSyDhqCjtURR6WZvLbHb-hbWzrP1fMxK0Dnk",
            authDomain: "estudahub-20436.firebaseapp.com",
            projectId: "estudahub-20436",
            storageBucket: "estudahub-20436.firebasestorage.app",
            messagingSenderId: "957089244219",
            appId: "1:957089244219:web:3cdc5c31261fab9843e81e"
        };

        // Inicialização
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let state = { temas: [] };

        // Troca de Telas
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
        }

        // Login com Google
        document.getElementById('btn-google').onclick = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (error) {
                alert("Erro ao entrar: " + error.message);
            }
        };

        window.logout = () => auth.signOut();

        // Salvar e Carregar
        async function save() {
            if (auth.currentUser) {
                await db.collection('usuarios').doc(auth.currentUser.uid).set(state);
            }
        }

        async function load() {
            if (auth.currentUser) {
                const doc = await db.collection('usuarios').doc(auth.currentUser.uid).get();
                if (doc.exists) {
                    state = doc.data();
                    render();
                }
            }
        }

        // Interface
        function render() {
            const list = document.getElementById('temas-list');
            list.innerHTML = state.temas.length ? '' : '<p style="color:var(--muted)">Nenhum tema salvo na nuvem.</p>';
            state.temas.forEach((t, i) => {
                list.innerHTML += `
                    <div style="padding:15px; background:var(--bg2); border:1px solid var(--border); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center">
                        <span>${t}</span>
                        <button onclick="deleteTema(${i})" style="background:none; border:none; color:var(--red); cursor:pointer">EXCLUIR</button>
                    </div>`;
            });
        }

        window.addTema = async () => {
            const nome = prompt("Nome do tema:");
            if(nome) {
                state.temas.push(nome);
                render();
                await save();
            }
        };

        window.deleteTema = async (index) => {
            state.temas.splice(index, 1);
            render();
            await save();
        };

        // O VIGIA: Faz o site reagir ao login
        auth.onAuthStateChanged(async (user) => {
            document.getElementById('loading-screen').style.display = 'none';
            if (user) {
                document.getElementById('user-display').innerText = (user.displayName || user.email).toUpperCase();
                await load();
                showScreen('main-screen');
            } else {
                showScreen('login-screen');
            }
        });
    </script>
</body>
</html>
