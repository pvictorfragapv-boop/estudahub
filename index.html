<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTUDAHUB | MEDICINA</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS ORIGINAL MANTIDO */
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0a0a0a; --bg2:#111111; --bg3:#181818;
            --border:#2a2a2a; --border2:#333; --text:#e8e8e8;
            --muted:#666; --accent:#e8e8e8; --green:#22c55e;
            --yellow:#eab308; --red:#ef4444; --blue:#3b82f6;
            --ticker-bg:#141414;
        }
        .theme-default{--accent:#e8e8e8;--hi:#ffffff}
        .theme-blue{--accent:#3b82f6;--hi:#60a5fa}
        .theme-green{--accent:#22c55e;--hi:#4ade80}
        body{background:var(--bg);color:var(--text);font-family:'Space+Mono',monospace;overflow-x:hidden}
        .screen{display:none;min-height:100vh;padding:20px;animation:fadeIn 0.4s ease}
        .screen.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        
        /* ESTILO DO LOGIN */
        .login-card{max-width:400px;margin:100px auto;padding:40px;background:var(--bg2);border:1px solid var(--border);text-align:center}
        .btn-google{background:#fff;color:#000;border:none;padding:12px 20px;cursor:pointer;font-weight:700;margin-top:20px;width:100%;display:flex;align-items:center;justify-content:center;gap:10px}
        
        /* RESTO DOS ESTILOS SIMPLIFICADOS PARA O EXEMPLO */
        h1,h2,h3{font-family:'Syne',sans-serif;text-transform:uppercase}
        .loading{position:fixed;inset:0;background:var(--bg);display:flex;justify-content:center;align-items:center;z-index:999}
    </style>
</head>
<body class="theme-default">

    <div id="loading-screen" class="loading">SINCRONIZANDO_COM_GOOGLE...</div>

    <section id="login-screen" class="screen">
        <div class="login-card">
            <h1>ESTUDAHUB</h1>
            <p style="color:var(--muted); margin-top:10px">// ACESSO AO SISTEMA</p>
            <button class="btn-google" id="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                ENTRAR COM GOOGLE
            </button>
        </div>
    </section>

    <section id="main-screen" class="screen">
        <header style="display:flex; justify-content:space-between; border-bottom:1px solid var(--border); padding-bottom:20px">
            <div>
                <h1 id="user-display">USER_NAME</h1>
                <p id="main-ticker" style="color:var(--accent)">CARREGANDO DADOS...</p>
            </div>
            <button onclick="logout()" style="background:none; border:1px solid var(--red); color:var(--red); padding:5px 10px; cursor:pointer">SAIR</button>
        </header>

        <main style="margin-top:40px">
            <h2>MEUS TEMAS DE ESTUDO</h2>
            <div id="temas-list" style="margin-top:20px">
                </div>
            <button onclick="addTema()" style="margin-top:20px; padding:10px; cursor:pointer; background:var(--accent); color:#000; border:none; font-weight:bold">+ ADICIONAR TEMA</button>
        </main>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhqCjtURR6WZvLbHb-hbWzrP1fMxK0Dnk",
            authDomain: "estudahub-20436.firebaseapp.com",
            projectId: "estudahub-20436",
            storageBucket: "estudahub-20436.firebasestorage.app",
            messagingSenderId: "957089244219",
            appId: "1:957089244219:web:3cdc5c31261fab9843e81e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let state = { temas: [] };

        // --- FUNÇÕES DE NAVEGAÇÃO ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- LOGIN COM GOOGLE ---
        document.getElementById('btn-google').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Erro no login:", error);
            }
        };

        window.logout = () => signOut(auth);

        // --- SALVAR E CARREGAR ---
        async function save() {
            if (!auth.currentUser) return;
            await setDoc(doc(db, "usuarios", auth.currentUser.uid), state);
        }

        async function load() {
            const docSnap = await getDoc(doc(db, "usuarios", auth.currentUser.uid));
            if (docSnap.exists()) {
                state = docSnap.data();
                render();
            }
        }

        // --- LÓGICA DE INTERFACE ---
        function render() {
            const list = document.getElementById('temas-list');
            list.innerHTML = state.temas.length ? '' : '<p style="color:var(--muted)">Nenhum tema salvo na nuvem.</p>';
            state.temas.forEach((t, i) => {
                list.innerHTML += `<div style="padding:10px; border:1px solid var(--border); margin-bottom:5px">${t}</div>`;
            });
            document.getElementById('main-ticker').innerText = `VOCÊ TEM ${state.temas.length} TEMAS SINCRONIZADOS`;
        }

        window.addTema = async () => {
            const nome = prompt("Nome do tema de medicina:");
            if(nome) {
                state.temas.push(nome);
                render();
                await save();
            }
        }

        // --- OBSERVADOR DE USUÁRIO (O CORAÇÃO DO SITE) ---
        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loading-screen').style.display = 'none';
            if (user) {
                document.getElementById('user-display').innerText = user.displayName;
                await load();
                showScreen('main-screen');
            } else {
                showScreen('login-screen');
            }
        });
    </script>
</body>
</html>
