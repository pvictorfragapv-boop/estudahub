<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EstudaHub</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #07070b; --bg2: #0e0e16; --bg3: #13131e; --bg4: #1a1a28;
      --border: #1c1c2e; --border2: #242438; --border3: #2e2e4a;
      --text: #e0e0f0; --muted: #42425a; --muted2: #64648c;
      --green: #1db870; --yellow: #f0b429; --red: #f04e4e; --blue: #4d9ef5;
      --g-bg: rgba(29,184,112,.1); --y-bg: rgba(240,180,41,.1); --r-bg: rgba(240,78,78,.1);
      --sb: env(safe-area-inset-bottom); --r: 8px; --r2: 12px;
      --slot-h: 28px; --tc-w: 56px;
    }
    .theme-default { --a: #a78bfa; --a2: #6d28d9; --ag: rgba(167,139,250,.16); --ad: rgba(167,139,250,.07); }
    .theme-blue    { --a: #60a5fa; --a2: #1d4ed8; --ag: rgba(96,165,250,.16);  --ad: rgba(96,165,250,.07); }
    .theme-green   { --a: #34d399; --a2: #047857; --ag: rgba(52,211,153,.16);  --ad: rgba(52,211,153,.07); }
    .theme-amber   { --a: #fbbf24; --a2: #b45309; --ag: rgba(251,191,36,.16);  --ad: rgba(251,191,36,.07); }
    .theme-red     { --a: #f87171; --a2: #b91c1c; --ag: rgba(248,113,113,.16); --ad: rgba(248,113,113,.07); }
    .theme-purple  { --a: #c084fc; --a2: #7e22ce; --ag: rgba(192,132,252,.16); --ad: rgba(192,132,252,.07); }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    body::after { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse 100% 60% at 50% -10%, var(--ag), transparent 55%); transition: background .6s; }
    body > * { position: relative; z-index: 1; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    
    /* TICKER */
    .ticker { height: 28px; overflow: hidden; white-space: nowrap; background: var(--bg2); border-bottom: 1px solid var(--border2); display: flex; align-items: center; font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--muted2); letter-spacing: .12em; }
    .ticker-inner { display: inline-block; animation: tick 40s linear infinite; }
    @keyframes tick { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .ticker-inner span { margin: 0 32px; }
    .ticker-inner .hi { color: var(--a); }

    /* LOADING */
    #loading-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
    .load-logo { font-size: 13px; font-weight: 700; letter-spacing: .4em; text-transform: uppercase; color: var(--text); font-family: 'IBM Plex Mono', monospace; }
    .load-bar { width: 120px; height: 1.5px; background: var(--border2); border-radius: 1px; overflow: hidden; }
    .load-bar-fill { height: 100%; background: linear-gradient(90deg, var(--a,#a78bfa), transparent); animation: loadanim 1.4s ease-in-out infinite; }
    @keyframes loadanim { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }

    /* NAV */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 36px; height: 54px; background: rgba(7,7,11,.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border2); position: sticky; top: 0; z-index: 50; }
    .nav-logo { font-weight: 900; font-size: 15px; letter-spacing: .2em; text-transform: uppercase; background: linear-gradient(120deg, var(--a), rgba(255,255,255,.9) 130%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: flex; align-items: center; gap: 8px; }
    .nav-orb { width: 6px; height: 6px; border-radius: 50%; background: var(--a); box-shadow: 0 0 8px var(--a); animation: orb-pulse 2.5s ease-in-out infinite; }
    @keyframes orb-pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.3; transform:scale(.6); } }
    .nav-tabs { display: flex; height: 54px; }
    .nav-tab { padding: 0 16px; height: 100%; display: flex; align-items: center; font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; color: var(--muted2); border-bottom: 2px solid transparent; transition: all .18s; white-space: nowrap; }
    .nav-tab.active { color: var(--a); border-bottom-color: var(--a); }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--a); }
    .user-initials { width: 28px; height: 28px; border-radius: 50%; background: var(--ad); border: 1.5px solid var(--border3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--a); }
    
    .screen { display: none; }
    
    /* LOGIN */
    #login-screen { min-height: 100vh; display: flex; background: var(--bg); }
    .login-left { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px; position: relative; overflow: hidden; }
    .login-left::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 48px 48px; opacity: .5; }
    .login-brand { position: relative; z-index: 1; text-align: center; }
    .login-brand-name { font-size: 48px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; background: linear-gradient(135deg, var(--a,#a78bfa), rgba(255,255,255,.8) 120%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 14px; }
    .login-right { width: 420px; display: flex; align-items: center; justify-content: center; padding: 48px; border-left: 1px solid var(--border); background: var(--bg2); }
    .btn-google { width: 100%; padding: 15px 20px; background: transparent; border: 1px solid var(--border3); color: var(--text); font-family: 'Outfit', sans-serif; font-weight: 700; cursor: pointer; border-radius: var(--r); display: flex; align-items: center; justify-content: center; gap: 12px; }

    /* ONBOARDING */
    #onboard-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .onboard-box { width: 100%; max-width: 500px; background: var(--bg2); border: 1px solid var(--border2); padding: 44px; border-radius: var(--r2); text-align: center; }
    .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
    .color-opt { padding: 15px; border-radius: var(--r); border: 2px solid transparent; cursor: pointer; font-size: 10px; font-weight: 800; }
    .color-opt.selected { border-color: white; }
    .c-default { background: #160e2e; color: #a78bfa; }
    .c-blue { background: #0d1e3a; color: #60a5fa; }
    .c-green { background: #081c12; color: #34d399; }
    .btn-primary { width: 100%; padding: 15px; background: var(--a); border: none; color: white; border-radius: var(--r); font-weight: 700; cursor: pointer; }

    /* Estilos Gerais do App (Simplificado) */
    .dash-header { padding: 40px 36px 20px; border-bottom: 1px solid var(--border2); }
    .dash-title { font-size: 32px; font-weight: 900; margin-bottom: 10px; }
    .stats-row { display: flex; gap: 10px; margin-top: 20px; }
    .stat-card { flex: 1; background: var(--bg2); padding: 20px; border-radius: var(--r); border: 1px solid var(--border2); }
    .stat-val { font-size: 24px; font-weight: 800; color: var(--a); }
    
    @media (max-width: 768px) {
        #login-screen { flex-direction: column; }
        .login-right { width: 100%; border-left: none; border-top: 1px solid var(--border); }
        .stats-row { flex-direction: column; }
    }
  </style>
</head>
<body class="theme-default">

  <div id="loading-screen">
    <div class="load-logo">EstudaHub</div>
    <div class="load-bar"><div class="load-bar-fill"></div></div>
  </div>

  <div id="login-screen" class="screen">
    <div class="login-left">
      <div class="login-brand">
        <div class="login-brand-name">EstudaHub</div>
        <div class="login-brand-tag mono">// rastreador inteligente de estudos</div>
      </div>
    </div>
    <div class="login-right">
      <div style="width:100%">
        <button class="btn-google" onclick="window.loginGoogle()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
          <span>Entrar com Google</span>
        </button>
      </div>
    </div>
  </div>

  <div id="onboard-screen" class="screen">
    <div class="onboard-box">
      <h2>Bem-vindo ao EstudaHub</h2>
      <p class="mono">Escolha seu tema:</p>
      <div class="color-grid">
        <div class="color-opt c-default selected" onclick="selectTheme(this, 'theme-default')">PADRÃO</div>
        <div class="color-opt c-blue" onclick="selectTheme(this, 'theme-blue')">AZUL</div>
        <div class="color-opt c-green" onclick="selectTheme(this, 'theme-green')">VERDE</div>
      </div>
      <button class="btn-primary" onclick="window.finishOnboard()">Começar →</button>
    </div>
  </div>

  <div id="app-screen" class="screen">
    <nav>
      <div class="nav-logo"><div class="nav-orb"></div>EstudaHub</div>
      <div class="nav-right" style="display:flex; align-items:center; gap:15px;">
        <img id="nav-avatar" class="user-avatar" style="display:none">
        <div id="nav-initials" class="user-initials"></div>
        <button onclick="window.logout()" style="background:none; border:1px solid var(--border3); color:var(--text); padding:5px 10px; border-radius:5px; cursor:pointer;">Sair</button>
      </div>
    </nav>

    <div class="dash-header">
      <div class="dash-title" id="greeting">Olá!</div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-lbl">Temas</div><div class="stat-val" id="stat-total">0</div></div>
        <div class="stat-card"><div class="stat-lbl">Concluídos</div><div class="stat-val" id="stat-done">0</div></div>
        <div class="stat-card"><div class="stat-lbl">Revisões</div><div class="stat-val" id="stat-rev">0</div></div>
      </div>
    </div>
    
    <div style="padding: 40px; text-align: center; color: var(--muted2);">
        <p class="mono">O Hub foi carregado com sucesso. Use o menu acima para navegar.</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const cfg = {
      apiKey: "AIzaSyDhqCjtURR6WZvLbHb-hbWzrP1fMxK0Dnk",
      authDomain: "estudahub-20436.firebaseapp.com",
      projectId: "estudahub-20436",
      storageBucket: "estudahub-20436.firebasestorage.app",
      messagingSenderId: "957089244219",
      appId: "1:957089244219:web:3cdc5c31261fab9843e81e"
    };

    const app = initializeApp(cfg);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let state = {
        theme: 'theme-default',
        isNewUser: true,
        temas: []
    };

    // FUNÇÕES GLOBAIS
    window.loginGoogle = async () => {
        try { await signInWithPopup(auth, provider); }
        catch(e) { console.error("Erro login:", e); }
    };

    window.logout = async () => {
        await signOut(auth);
        window.location.reload();
    };

    window.selectTheme = (el, t) => {
        document.querySelectorAll('.color-opt').forEach(opt => opt.classList.remove('selected'));
        el.classList.add('selected');
        state.theme = t;
        document.body.className = t;
    };

    window.finishOnboard = async () => {
        state.isNewUser = false;
        await saveToFirebase();
        enterApp();
    };

    async function saveToFirebase() {
        if (!auth.currentUser) return;
        await setDoc(doc(db, 'users', auth.currentUser.uid, 'data', 'state'), state);
    }

    function showScreen(n) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        const target = document.getElementById(n + '-screen');
        if (n === 'login' || n === 'onboard') target.style.display = 'flex';
        else target.style.display = 'block';
    }

    function enterApp() {
        document.body.className = state.theme;
        const u = auth.currentUser;
        document.getElementById('greeting').textContent = `Olá, ${u.displayName.split(' ')[0]}!`;
        
        const av = document.getElementById('nav-avatar');
        const ini = document.getElementById('nav-initials');
        if (u.photoURL) {
            av.src = u.photoURL; av.style.display = 'block'; ini.style.display = 'none';
        } else {
            ini.textContent = u.displayName[0]; ini.style.display = 'flex';
        }
        
        showScreen('app');
    }

    // LISTENER DE AUTH
    onAuthStateChanged(auth, async (user) => {
        document.getElementById('loading-screen').style.display = 'none';
        if (user) {
            const snap = await getDoc(doc(db, 'users', user.uid, 'data', 'state'));
            if (snap.exists()) {
                state = snap.data();
                if (state.isNewUser) showScreen('onboard');
                else enterApp();
            } else {
                showScreen('onboard');
            }
        } else {
            showScreen('login');
        }
    });
  </script>
</body>
</html>
